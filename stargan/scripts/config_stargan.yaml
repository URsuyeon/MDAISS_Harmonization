project:
  name: stargan3d_v2
  seed: 42
  save_dir: /public/sylee/MDAISS_2/models/stargan3d_V2_re/

data:
  root: /public/sylee/MDAISS_2/output/
  batch_size: 6
  num_workers: 4
  input_shape: [128, 128, 128]

model:
  name: stargan3d_v2
  style_dim: 64
  content_dim: 64

train:
  epochs: 100

  # Learning rate 설정 (TTUR 적용)
  generator_lr: 0.0001
  discriminator_lr: 0.0001

  beta1: 0.5
  beta2: 0.999

  # Loss weight 최대값 (warm-up은 코드에서 설정)
  lambda_cyc_max: 10.0
  lambda_sty_max: 2.0
  lambda_con_max: 10.0
  lambda_cls: 1.0
  lambda_grl_max: 1.0

  # Warm-up 단계 수
  warmup_cyc_epochs: 10
  warmup_sty_epochs: 0
  warmup_con_epochs: 20
  warmup_grl_epochs: 20

  use_warmup: true
  two_stage_training: true

  save_interval: 1
  grad_accum_steps: 1
  use_mixed_precision: false

logging:
  use_wandb: true 
  log_interval: 10
